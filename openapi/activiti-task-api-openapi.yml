      operationId: removeInvolvedUserUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: requestNode
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectNode'
        required: true
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/action/unclaim:
    put:
      tags:
      - Task
      summary: Unclaim a task
      description: To unclaim a task (in case the task was assigned to a group)
      operationId: unclaimTaskUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/checklist:
    get:
      tags:
      - Task
      summary: Retrieve Checklist added to a task
      operationId: getChecklistUsingGET
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListDataRepresentation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    post:
      tags:
      - Task
      summary: Create a task checklist
      operationId: addSubtaskUsingPOST
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: taskRepresentation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRepresentation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    put:
      tags:
      - Task
      summary: Change the order of items on a checklist
      operationId: orderChecklistUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: orderRepresentation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistOrderRepresentation'
        required: true
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/comments:
    get:
      tags:
      - Task
      summary: Comment list added to Task
      operationId: getTaskCommentsUsingGET
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      - name: latestFirst
        in: query
        description: latestFirst
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListDataRepresentation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    post:
      tags:
      - Task
      summary: Add a comment to a Task
      operationId: addTaskCommentUsingPOST
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: commentRequest
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRepresentation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/content:
    get:
      tags:
      - Task
      summary: Retrieve which content is attached to a task
      operationId: getRelatedContentForTaskUsingGET
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListDataRepresentation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    post:
      tags:
      - Task
      summary: To relate content (eg from Alfresco) to a task
      operationId: createRelatedContentOnTaskUsingPOST
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      - name: isRelatedContent
        in: query
        description: isRelatedContent
        required: false
        schema:
          type: boolean
      requestBody:
        description: relatedContent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelatedContentRepresentation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedContentRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/raw-content:
    post:
      tags:
      - Task
      summary: Upload content to a task
      operationId: createRelatedContentOnTaskUsingPOST_1
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      - name: file
        in: formData
        description: file
        required: true
        schema:
          type: file
      - name: isRelatedContent
        in: query
        description: isRelatedContent
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedContentRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
components:
  schemas:
    SaveFormRepresentation:
      properties:
        values:
          type: object
    CompleteFormRepresentation:
      properties:
        outcome:
          type: string
        values:
          type: object
    OptionRepresentation:
      properties:
        id:
          type: string
        name:
          type: string
    LightUserRepresentation:
      properties:
        email:
          type: string
        externalId:
          type: string
        firstName:
          type: string
        id:
          type: integer
          format: int64
        lastName:
          type: string
        pictureId:
          type: integer
          format: int64
    ObjectNode: {}
    FormJavascriptEventRepresentation:
      properties:
        event:
          type: string
        javascriptLogic:
          type: string
    AbstractRepresentation: {}
    TaskRepresentation:
      properties:
        adhocTaskCanBeReassigned:
          type: boolean
        assignee:
          $ref: '#/components/schemas/LightUserRepresentation'
        category:
          type: string
        created:
          type: string
          format: date-time
        description:
          type: string
        dueDate:
          type: string
          format: date-time
        duration:
          type: integer
          format: int64
        endDate:
          type: string
          format: date-time
        formKey:
          type: string
        id:
          type: string
        initiatorCanCompleteTask:
          type: boolean
        involvedPeople:
          type: array
          items:
            $ref: '#/components/schemas/LightUserRepresentation'
        memberOfCandidateGroup:
          type: boolean
        memberOfCandidateUsers:
          type: boolean
        name:
          type: string
        parentTaskId:
          type: string
        parentTaskName:
          type: string
        priority:
          type: integer
          format: int32
        processDefinitionCategory:
          type: string
        processDefinitionDeploymentId:
          type: string
        processDefinitionDescription:
          type: string
        processDefinitionId:
          type: string
        processDefinitionKey:
          type: string
        processDefinitionName:
          type: string
        processDefinitionVersion:
          type: integer
          format: int32
        processInstanceId:
          type: string
        processInstanceName:
          type: string
        processInstanceStartUserId:
          type: string
    TaskFilterRepresentation:
      properties:
        asc:
          type: boolean
        assignment:
          type: string
        dueAfter:
          type: string
          format: date-time
        dueBefore:
          type: string
          format: date-time
        name:
          type: string
        processDefinitionId:
          type: string
        processDefinitionKey:
          type: string
        sort:
          type: string
        state:
          type: string
    ResultListDataRepresentation:
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AbstractRepresentation'
        size:
          type: integer
          format: int32
        start:
          type: integer
          format: int32
        total:
          type: integer
          format: int32
    TaskUpdateRepresentation:
      properties:
        description:
          type: string
        descriptionSet:
          type: boolean
        dueDate:
          type: string
          format: date-time
        dueDateSet:
          type: boolean
        name:
          type: string
        nameSet:
          type: boolean
    CommentRepresentation:
      properties:
        created:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/LightUserRepresentation'
        id:
          type: integer
          format: int64
        message:
          type: string
    FormTabRepresentation:
      properties:
        id:
          type: string
        title:
          type: string
        visibilityCondition:
          $ref: '#/components/schemas/ConditionRepresentation'
    FormFieldRepresentation:
      properties:
        className:
          type: string
        col:
          type: integer
          format: int32
        colspan:
          type: integer
          format: int32
        hasEmptyValue:
          type: boolean
        id:
          type: string
        layout:
          $ref: '#/components/schemas/LayoutRepresentation'
        maxLength:
          type: integer
          format: int32
        maxValue:
          type: string
        minLength:
          type: integer
          format: int32
        minValue:
          type: string
        name:
          type: string
        optionType:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/OptionRepresentation'
        overrideId:
          type: boolean
        params:
          type: object
        placeholder:
          type: string
        readOnly:
          type: boolean
        regexPattern:
          type: string
        required:
          type: boolean
        restIdProperty:
          type: string
        restLabelProperty:
          type: string
        restResponsePath:
          type: string
        restUrl:
          type: string
        row:
          type: integer
          format: int32
        sizeX:
          type: integer
          format: int32
        sizeY:
          type: integer
          format: int32
        tab:
          type: string
        type:
          type: string
        value:
          type: object
        visibilityCondition:
          $ref: '#/components/schemas/ConditionRepresentation'
    FormDefinitionRepresentation:
      properties:
        className:
          type: string
        customFieldTemplates:
          type: object
          additionalProperties:
            type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormFieldRepresentation'
