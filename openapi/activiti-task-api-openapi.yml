          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRepresentation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    put:
      tags:
      - Task
      summary: Update Task Details
      description: You can edit only name, description and dueDate (ISO 8601 string).
      operationId: updateTaskUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRepresentation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    delete:
      tags:
      - Task
      summary: Delete a Task
      operationId: deleteTaskUsingDELETE
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/enterprise/tasks/{taskId}/action/assign:
    put:
      tags:
      - Task
      summary: Assign a task to a user
      operationId: assignTaskUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: requestNode
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectNode'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRepresentation'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/action/attach-form:
    put:
      tags:
      - Task
      summary: Attach a form to a task
      operationId: attachFormUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      requestBody:
        description: requestNode
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectNode'
        required: true
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/action/claim:
    put:
      tags:
      - Task
      summary: Claim a task
      description: To claim a task (in case the task is assigned to a group)
      operationId: claimTaskUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/action/complete:
    put:
      tags:
      - Task
      summary: Complete Task
      description: To complete a task (standalone or without a task form)
      operationId: completeTaskUsingPUT
      parameters:
      - name: taskId
        in: path
        description: taskId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /api/enterprise/tasks/{taskId}/action/involve:
    put:
      tags:
