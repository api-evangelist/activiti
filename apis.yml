aid: activiti
name: Activiti
description: >-
  Activiti is a lightweight, Java-centric open-source Business Process
  Management (BPM) and workflow automation engine. It provides a BPMN 2.0
  compliant process engine and a REST API for managing process definitions,
  process instances, tasks, variables, user management, deployments, and
  historical data. Activiti Cloud extends the platform to cloud-native
  environments using Spring Boot, Docker, and Kubernetes.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/activiti/refs/heads/main/apis.yml
created: 2026-06-13
modified: 2026-06-13
specificationVersion: "0.19"
tags:
